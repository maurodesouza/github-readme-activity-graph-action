name: GitHub Readme Activity Graph Action
description: Generate GitHub Readme Activity Graph in GitHub Actions.
author: maurodesouza

inputs:
  username:
    description: GitHub username to generate the activity graph for.
    required: true
  options:
    description: Options for the card (query string or JSON).
    required: false
    default: ""
  output_path:
    description: Output path for SVG file (relative path; include filename with .svg).
    required: false
    default: ""
  token:
    description: GitHub token (PAT or GITHUB_TOKEN). Falls back to github.token if not provided.
    required: false
    default: ""

outputs:
  path:
    description: Path where the SVG file was written.
    value: ${{ steps.generate.outputs.path }}

runs:
  using: composite
  steps:
    - name: Cache pnpm modules
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-
    - name: Resolve relative path to package.json
      id: resolve-path
      run: echo "package_json=$(realpath --relative-to="$GITHUB_WORKSPACE" "${{ github.action_path }}/package.json")" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      with:
        package_json_file: ${{ steps.resolve-path.outputs.package_json }}
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Generate card
      id: generate
      run: node --import tsx ${{ github.action_path }}/src/index.js
      shell: bash
      env:
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_OPTIONS: ${{ inputs.options }}
        INPUT_OUTPUT_PATH: ${{ inputs.output_path }}
        TOKEN: ${{ inputs.token || github.token }}
branding:
  icon: bar-chart-2
  color: blue
